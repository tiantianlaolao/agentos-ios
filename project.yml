name: AgentOS
options:
  bundleIdPrefix: com.agentos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  AgentOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - AgentOS
    settings:
      base:
        INFOPLIST_FILE: AgentOS/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentos.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: 8J6A847P66
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    dependencies:
      - package: GRDB
        product: GRDB
      - package: MarkdownUI
        product: MarkdownUI

  AgentOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AgentOSTests
    dependencies:
      - target: AgentOS
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgentOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AgentOS"
