name: Upload App Store Metadata

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

          jq -n \
            --arg key_id "$ASC_KEY_ID" \
            --arg issuer_id "$ASC_ISSUER_ID" \
            --arg key "$(cat ~/private_keys/AuthKey_${ASC_KEY_ID}.p8)" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
            > /tmp/api_key.json

      - name: Upload metadata and screenshots
        run: |
          fastlane deliver \
            --api_key_path /tmp/api_key.json \
            --app_identifier com.agentosplus.app \
            --skip_binary_upload true \
            --overwrite_screenshots true \
            --force true \
            --precheck_include_in_app_purchases false

      - name: Clean up
        if: always()
        run: rm -rf ~/private_keys /tmp/api_key.json
